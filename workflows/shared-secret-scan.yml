# Reusable secret-scanning workflow for all thevoltcloud repos.
# Wraps the trusted gitleaks action (https://github.com/gitleaks/gitleaks-action).
#
# Call from a repo with:
#   jobs:
#     secrets:
#       uses: thevoltcloud/.github/.github/workflows/shared-secret-scan.yml@main
#       secrets: inherit
name: shared-secret-scan

on:
  workflow_call:
    inputs:
      fetch-depth:
        description: "Git history depth to scan (0 = full history)."
        type: number
        default: 0

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: ${{ inputs.fetch-depth }}
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # GITLEAKS_LICENSE only required for orgs; safe to leave unset for public repos.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
