name: Question
description: Ask a question about using a Volt repository.
title: "question: "
labels: ["question", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        For general or cross-repo questions, [GitHub Discussions](https://github.com/orgs/thevoltcloud/discussions)
        is usually a better place. Use this template when the question is specific to this repository.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do, and where are you stuck?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: What you've tried
      description: Docs you've read, commands you've run, links you've followed.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the docs at https://docs.voltcloud.ai and searched existing issues/Discussions.
          required: true
